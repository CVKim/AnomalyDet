# DINOv2 ViT-S/14 backbone. Input must be divisible by 14 (patch size).
# 224 / 14 = 16, so feature maps are 16x16. ViT-S has 12 transformer
# blocks (0-indexed); we tap mid (5) and last (11), analogous to taking
# layer2+layer3 from a ResNet.
backbone: dinov2_vits14
layers:
  - 5
  - 11
input_size: 224
batch_size: 8
num_workers: 4

coreset_ratio: 0.1
coreset_projection_dim: 128

threshold_mode: adaptive
image_gate_factor: 1.3
severity_fraction: 0.5
pixel_floor_factor: 1.1
test_percentile: 99.0

morph_kernel: 3
min_area: 30
poly_eps_ratio: 0.005
