# DINOv2 ViT-S/14 + pose augmentation, tuned for hazelnut.
backbone: dinov2_vits14
layers:
  - 5
  - 11
input_size: 224
batch_size: 8
num_workers: 4

train_augment: true
train_repeat: 4

coreset_ratio: 0.1
coreset_projection_dim: 128

# See note in configs/hazelnut.yaml — train_p999 is the right default
# once pose augmentation is enabled.
threshold_mode: train_p999
image_gate_factor: 1.3
severity_fraction: 0.5
pixel_floor_factor: 1.1
test_percentile: 99.0

morph_kernel: 3
min_area: 30
poly_eps_ratio: 0.005
