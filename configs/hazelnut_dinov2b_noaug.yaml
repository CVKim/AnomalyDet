# Vanilla PatchCore approach for hazelnut: no augmentation, larger
# coreset to capture the natural variation directly. This tests
# whether random rotations were actually helping or hurting.
backbone: dinov2_vitb14
layers:
  - 5
  - 11
input_size: 392
batch_size: 4
num_workers: 4

train_augment: false
train_repeat: 1

coreset_ratio: 0.25
coreset_projection_dim: 128

reweight_k: 9

smooth_kernel: 7
smooth_sigma: 2.0

threshold_mode: train_p999
threshold_value: null
image_gate_factor: 1.3
severity_fraction: 0.5
pixel_floor_factor: 1.1
test_percentile: 99.0

morph_kernel: 7
min_area: 500
poly_eps_ratio: 0.005

viz_anomaly_scale: 1.3

foreground_mask: true
foreground_bg_threshold: 30
