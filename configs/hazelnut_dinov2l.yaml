# Hazelnut top-quality stack: DINOv2 ViT-L/14 (304M params, 1024 dim,
# 24 blocks). 4x the parameter count of ViT-B/14, with deeper features
# that should pick up the hairline crack texture our ViT-B run was
# missing.
#
# Layer choice mirrors the ViT-S/B mid+last pattern: block 10 (~42%
# depth) and block 23 (last). 392 input = 28x28 patches at patch 14.
#
# coreset_ratio drops to 0.03 (vs 0.05 on ViT-B) because the embedding
# dim is 2x bigger; we keep the on-GPU memory bank under ~500 MB.
backbone: dinov2_vitl14
layers:
  - 10
  - 23
input_size: 392
batch_size: 2
num_workers: 4

train_augment: true
train_repeat: 4

coreset_ratio: 0.03
coreset_projection_dim: 128

reweight_k: 9

smooth_kernel: 7
smooth_sigma: 2.0

threshold_mode: train_p999
# Sits between train_p999 (~25.7) and train_pixel_max (~39.1). Empirical
# sweet spot: every defect type still flagged, surface false positives
# on crack drop to single-digit percent, good frames produce no mask.
threshold_value: 30.0
image_gate_factor: 1.3
severity_fraction: 0.5
pixel_floor_factor: 1.1
test_percentile: 99.0

morph_kernel: 7
min_area: 500
merge_kernel: 31
poly_eps_ratio: 0.005

viz_anomaly_scale: 1.3

foreground_mask: true
foreground_bg_threshold: 30
